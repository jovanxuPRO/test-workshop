<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试工坊 Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#333}
.nav{background:#5c6bc0;color:#fff;padding:12px 20px;display:flex;gap:20px;align-items:center;font-size:14px}
.nav a{color:#c4c9f7;text-decoration:none;cursor:pointer}.nav a:hover,.nav a.on{color:#fff}
.main{max-width:1000px;margin:20px auto;padding:0 20px}
.card{background:#fff;border-radius:10px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
h2{font-size:17px;margin-bottom:12px;color:#2c3e50}
.row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:200px}
label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
input,textarea,select{width:100%;padding:8px 12px;border:2px solid #e8ecf1;border-radius:7px;font-size:13px;font-family:inherit}
textarea{min-height:100px;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:#5c6bc0;outline:none}
.btn{padding:10px 24px;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:#5c6bc0;color:#fff}.btn-primary:hover{opacity:.9}
.btn-go{background:#26a69a;color:#fff;font-size:16px;padding:14px 40px;width:100%}.btn-go:hover{opacity:.9}
.btn-sm{padding:5px 12px;font-size:11px}
.templates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.tpl{padding:10px 16px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.tpl:hover{border-color:#5c6bc0}.tpl.on{border-color:#26a69a;background:#f0fdf4}
.endpoint{display:flex;gap:6px;align-items:center;padding:8px 10px;background:#f8f9fb;border-radius:7px;margin-bottom:6px}
.endpoint input,.endpoint select{padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;flex:1}
.del{color:#ef5350;cursor:pointer;font-weight:700;font-size:16px;padding:4px}
.metrics{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
.m{background:#f8f9fb;border-radius:8px;padding:14px;text-align:center;min-width:90px;flex:1}
.m .v{font-size:26px;font-weight:700;display:block}.m .l{font-size:11px;color:#888;margin-top:3px}
.bar{height:10px;background:#e8ecf1;border-radius:5px;overflow:hidden;margin:10px 0}
.bar-f{height:100%;border-radius:5px;transition:width .3s}
.log{background:#1a1c23;color:#a2a3b7;padding:12px;border-radius:8px;font-size:12px;font-family:Consolas,monospace;max-height:400px;overflow-y:auto;line-height:1.6}
.pass{color:#55efc4}.fail{color:#ff7675}
.hidden{display:none}
.add-btn{width:100%;padding:6px;border:2px dashed #d0d5e0;border-radius:7px;font-size:12px;color:#8898aa;background:transparent;cursor:pointer;margin-top:6px;text-align:center}
.add-btn:hover{border-color:#5c6bc0;color:#5c6bc0}
</style>
</head>
<body>
<nav class="nav">
    <strong>测试工坊 Pro</strong>
    <a class="on" role="button" tabindex="0" onclick="tab('plan')" onkeydown="if(event.key==='Enter')tab('plan')">新建方案</a>
    <a role="button" tabindex="0" onclick="tab('exec')" onkeydown="if(event.key==='Enter')tab('exec')">执行</a>
    <a href="/api/history" target="_blank" rel="noopener noreferrer">执行历史</a>
    <a href="/api/report-list" target="_blank" rel="noopener noreferrer">测试报告</a>
    <a href="/tc" target="_blank" rel="noopener noreferrer">用例管理</a>
    <a role="button" tabindex="0" onclick="tab('ai')" onkeydown="if(event.key==='Enter')tab('ai')">AI配置</a>
    <span id="ai-status" style="font-size:11px;margin-left:auto;color:#888"></span>
</nav>

<!-- No floating modals — AI config is in the AI Settings tab -->

<div class="main">
<!-- PLAN -->
<div id="tab-plan">
    <div class="card">
        <h2>1. 选择模板 & 项目信息</h2>
        <div class="templates" id="tpls"></div>
        <div class="row">
            <div><label for="p-name">项目名称</label><input id="p-name" placeholder="被测项目名称"></div>
            <div><label for="p-url">Base URL</label><input id="p-url" placeholder="https://example.com"></div>
        </div>
        <div class="row" style="margin-top:10px">
            <div><label for="p-auth">认证方式</label><select id="p-auth" onchange="toggleAuth()" style="width:100%">
                <option value="none">无需认证</option>
                <option value="header">Custom Header</option>
                <option value="bearer">Bearer Token</option>
                <option value="basic">Basic Auth</option>
            </select></div>
            <div id="auth-value-group" style="display:none" aria-live="polite">
                <label for="p-auth-value">认证值 <span style="color:#ef5350;font-size:10px">(仅内存存储)</span></label>
                <input id="p-auth-value" placeholder="Token/Cookie值" type="password" style="width:100%">
            </div>
        </div>
    </div>

    <div class="card">
        <h2>2. API 接口</h2>
        <div style="overflow-x:auto">
        <table style="width:100%;font-size:12px;margin-bottom:6px" id="api-table">
            <thead><tr style="background:#f8f9fb"><th style="width:80px;padding:6px 8px;text-align:left">方法</th><th style="padding:6px 8px;text-align:left">路径</th><th style="padding:6px 8px;text-align:left">说明</th><th style="width:30px"></th></tr></thead>
            <tbody id="api-list"></tbody>
        </table></div>
        <button class="add-btn" onclick="addApi()">+ 添加接口</button>
        <button class="add-btn" id="tc-import-btn" onclick="loadTCs()" style="background:#5c6bc0;margin-left:4px">从用例库导入 (0)</button>
    </div>

    <!-- TC import modal -->
    <div id="tc-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:9999" onclick="this.style.display='none'">
    <div class="modal-card" style="background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;margin:auto;position:relative;top:10%" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <h3 style="margin:0">从用例库导入</h3>
            <span onclick="document.getElementById('tc-modal').style.display='none'" style="cursor:pointer;font-size:24px">&times;</span>
        </div>
        <input id="tc-search" placeholder="搜索用例..." style="width:100%;margin-bottom:10px;padding:8px;border:1px solid #ddd;border-radius:6px" oninput="renderTCList()">
        <div id="tc-list" style="max-height:300px;overflow-y:auto;margin-bottom:12px"></div>
        <button class="btn" onclick="importSelectedTCs()" style="width:100%;background:#5c6bc0;color:#fff;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:14px">导入选中用例</button>
    </div></div>

    <div class="card">
        <h2>3. Web 页面</h2>
        <div style="overflow-x:auto">
        <table style="width:100%;font-size:12px;margin-bottom:6px" id="pg-table">
            <thead><tr style="background:#f8f9fb"><th style="padding:6px 8px;text-align:left;width:180px">页面路径</th><th style="padding:6px 8px;text-align:left">页面名称</th><th style="width:80px;text-align:left">浏览器</th><th style="width:30px"></th></tr></thead>
            <tbody id="pg-list"></tbody>
        </table></div>
        <button class="add-btn" onclick="addPg()">+ 添加页面</button>
    </div>

    <div class="card">
        <h2>4. 数据规则</h2>
        <label for="p-rules">每行一条规则</label>
        <textarea id="p-rules" placeholder="首页HTTP 200\n响应时间<5秒\n数据一致"></textarea>
    </div>

    <button class="btn" onclick="previewCases()" style="width:100%;background:#5c6bc0;color:#fff;font-size:15px;padding:14px;border:none;border-radius:8px;cursor:pointer;font-weight:700">生成用例预览</button>
    <p style="text-align:center;color:#888;font-size:12px;margin:6px 0">每次生成可能不同 — 不满意可重新生成</p>

    <!-- Case preview (shown after previewCases) -->
    <div id="case-preview" class="hidden card" style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h3 style="margin:0" id="case-preview-title">用例预览</h3>
            <span id="source-badge" style="font-size:11px;padding:2px 10px;border-radius:10px;display:none"></span>
            <span style="display:flex;gap:6px">
                <button class="btn btn-sm" onclick="previewCases()" style="background:#fff;color:#5c6bc0;border:1px solid #5c6bc0;font-size:13px;padding:6px 16px" title="AI 重新生成">重新生成</button>
                <button class="btn btn-sm" onclick="execPreviewed()" style="background:#26a69a;color:#fff;font-size:13px;padding:6px 16px">执行选中</button>
                <button class="btn btn-sm" onclick="savePreviewed()" style="background:#5c6bc0;color:#fff;font-size:13px;padding:6px 16px">保存到用例库</button>
            </span>
        </div>
        <div style="overflow-x:auto">
        <table style="width:100%;font-size:12px;table-layout:auto" id="preview-table">
            <thead><tr style="background:#f8f9fb">
                <th style="width:28px;position:sticky;left:0;background:#f8f9fb"><input type="checkbox" id="preview-select-all" onchange="togglePreviewAll()"></th>
                <th style="width:30px;background:#f8f9fb;cursor:pointer;text-align:center" onclick="toggleAllLocks()" title="全部锁定/解锁">🔒</th>
                <th style="width:55px">编号</th>
                <th style="width:80px">模块</th>
                <th style="min-width:180px">用例标题</th>
                <th style="width:45px">类型</th>
                <th style="width:50px">优先级</th>
                <th style="min-width:120px">前置条件</th>
                <th style="width:55px">方法</th>
                <th style="min-width:140px">路径</th>
                <th style="min-width:140px">预期结果</th>
                <th style="min-width:120px">测试步骤</th>
                <th style="width:70px">测试数据</th>
            </tr></thead>
            <tbody id="case-preview-list"></tbody>
        </table></div>
    </div>

    <button class="btn btn-go" onclick="generate()" style="margin-top:8px">直接执行全部</button>
    <div id="results" class="hidden" style="margin-top:16px" aria-live="polite" aria-atomic="true"></div>
</div>

<!-- AI -->
<div id="tab-ai" class="hidden">
    <div style="display:flex;gap:16px;align-items:flex-start">
    <!-- Left: config list -->
    <div class="card" style="width:240px;flex-shrink:0;padding:14px">
        <h3 style="margin:0 0 4px;font-size:14px">已保存配置</h3>
        <p style="color:#888;font-size:10px;margin:0 0 10px">点击切换当前使用的配置</p>
        <div id="ai-config-list" style="max-height:420px;overflow-y:auto;margin-bottom:8px;font-size:12px"></div>
        <button onclick="newAIConfig()" style="width:100%;background:#5c6bc0;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:12px">+ 新增配置</button>
    </div>
    <!-- Right: config form -->
    <div class="card" style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:8px">
                <h2 style="margin:0;font-size:16px">配置详情</h2>
                <input id="ai-config-name" placeholder="配置名称" style="font-size:13px;padding:4px 8px;border:1px solid #ddd;border-radius:4px;width:140px">
            </div>
            <span style="display:flex;gap:6px">
                <button onclick="saveAIConfig()" style="background:#5c6bc0;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">保存</button>
                <button onclick="deleteAIConfig()" style="background:#fce4ec;color:#ef5350;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px">删除</button>
            </span>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:12px">
            <div style="flex:1"><label style="font-size:11px">模型提供商</label>
            <select id="ai-provider" onchange="onAIProviderChange()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px">
                <option value="openai">OpenAI</option>
                <option value="deepseek">DeepSeek</option>
                <option value="qwen">通义千问 (Qwen)</option>
                <option value="claude">Claude (Anthropic)</option>
                <option value="custom">自定义</option></select></div>
            <div style="flex:1"><label style="font-size:11px">模型名称</label>
            <input id="ai-model" placeholder="gpt-4o" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px"></div>
        </div>

        <div style="margin-bottom:12px">
            <label style="font-size:11px">API Base URL</label>
            <input id="ai-base-url" placeholder="https://api.openai.com/v1" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px">
        </div>

        <label style="font-size:11px">API Key</label>
        <div style="display:flex;gap:6px;margin-top:3px">
            <input id="ai-key-input" type="password" placeholder="输入新密钥（已配置则留空）" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px">
            <button onclick="toggleAIKeyVisibility()" style="background:none;border:1px solid #ddd;border-radius:6px;padding:0 10px;cursor:pointer" id="ai-eye">👁</button>
        </div>
        <span id="ai-key-status" style="font-size:11px;color:#888;display:none"></span>

        <div style="display:flex;gap:12px;margin-top:12px">
            <div style="flex:1"><label style="font-size:11px">Temperature</label>
            <input id="ai-temp" type="number" min="0" max="2" step="0.1" value="0.7" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px"></div>
            <div style="flex:1"><label style="font-size:11px">Max Tokens</label>
            <input id="ai-max-tokens" type="number" min="100" max="32000" step="100" value="4096" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:12px"></div>
        </div>

        <label style="font-size:11px;margin-top:12px;display:block">System Prompt</label>
        <textarea id="ai-system-prompt" rows="2" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:11px;resize:vertical;font-family:monospace">你是一个专业的测试工程师，根据 API 定义生成 ISTQB 标准的测试用例。</textarea>

        <div id="ai-saved-msg" style="margin-top:10px;font-size:12px;display:none"></div>
    </div>
    </div>
</div>

<!-- EXEC -->
<div id="tab-exec" class="hidden">
    <div class="card">
        <h2>选择方案执行</h2>
        <select id="hist-sel" style="width:100%" onchange="onHist()"><option value="">-- 选择 --</option></select>
        <button class="btn btn-primary btn-go" id="btn-hist" onclick="execHist()" disabled style="margin-top:10px">执行</button>
    </div>
    <div class="card hidden" id="dash" aria-live="polite">
        <h2 id="dash-title">实时面板</h2>
        <div class="metrics" style="cursor:pointer" onclick="window.open('/api/report')">
            <div class="m"><span class="v" style="color:#3498db" id="m-total">0</span><span class="l">总计</span></div>
            <div class="m"><span class="v" style="color:#27ae60" id="m-passed">0</span><span class="l">通过</span></div>
            <div class="m"><span class="v" style="color:#ef5350" id="m-failed">0</span><span class="l">失败</span></div>
            <div class="m"><span class="v" style="color:#ff9800" id="m-errors">0</span><span class="l">错误</span></div>
            <div class="m"><span class="v" style="color:#5c6bc0" id="m-rate">-</span><span class="l">通过率</span></div>
        </div>
        <div class="bar"><div class="bar-f" id="dash-bar" style="width:0%;background:#5c6bc0"></div></div>
        <div class="log" id="dash-log">等待执行...</div>
    </div>
    <div class="card" id="exec-log-list" style="max-height:400px;overflow-y:auto"></div>
</div>
</div>

<script>
// ===== DATA =====
const TPLS = {
    task: {name:"Task Manager",url:"http://127.0.0.1:8000", apis:[
        {m:"GET",p:"/api/users",n:"用户列表"},{m:"POST",p:"/api/users",n:"创建用户"},{m:"GET",p:"/api/users/{id}",n:"用户详情"},
        {m:"PUT",p:"/api/users/{id}",n:"更新用户"},{m:"DELETE",p:"/api/users/{id}",n:"删除用户"},
        {m:"GET",p:"/api/tasks",n:"任务列表"},{m:"POST",p:"/api/tasks",n:"创建任务"},
        {m:"PUT",p:"/api/tasks/{id}",n:"更新任务"},{m:"DELETE",p:"/api/tasks/{id}",n:"删除任务"},
        {m:"GET",p:"/api/stats",n:"数据统计"}],
        pgs:[{u:"/",na:"首页",ac:"仪表盘"},{u:"/users-page",na:"用户管理",ac:"增删改"},{u:"/tasks-page",na:"任务管理",ac:"增删改+过滤"}],
        rules:"删除用户后关联任务负责人清空\n统计API数据与实际一致\n状态分布之和=总任务数\n重复用户名/邮箱应被拒绝\n完成率=done/total×100"},
    baidu:{name:"Baidu 百度全量",url:"https://www.baidu.com", apis:[
        {m:"GET",p:"/",n:"首页"},
        {m:"HEAD",p:"/",n:"首页HEAD"},
        {m:"GET",p:"/s?wd=hello",n:"英文搜索"},
        {m:"GET",p:"/s?wd=测试",n:"中文搜索"},
        {m:"GET",p:"/s?wd=test&pn=10",n:"搜索第2页"},
        {m:"GET",p:"/s?wd=test&pn=20",n:"搜索第3页"},
        {m:"GET",p:"/s?wd=test&rn=50",n:"每页50条"},
        {m:"GET",p:"/s?wd=",n:"空关键词"},
        {m:"GET",p:"/s?wd=test&rsv_spt=1",n:"搜索建议"},
        {m:"POST",p:"/s",n:"POST搜索"},
        {m:"GET",p:"https://www.baidu.com/img/bd_logo1.png",n:"Logo图片"},
        {m:"GET",p:"https://www.baidu.com/img/PCtm_d9c8750bed0b3c7d089fa7d55720d6cf.png",n:"静态资源"},
        {m:"GET",p:"https://www.baidu.com/search/error.html",n:"错误页面"},
    ],
        pgs:[
            {u:"/",na:"首页",ac:"搜索框可见+无JS报错"},
            {u:"/s?wd=hello",na:"英文搜索",ac:"结果列表加载"},
            {u:"/s?wd=测试",na:"中文搜索",ac:"Unicode关键词正常"},
            {u:"/s?wd=test&pn=10",na:"搜索结果第2页",ac:"翻页导航正常"},
        ],
        pgs:[], rules:"posts返回100条\n每条含userId/id/title/body\nPOST返回201\nPUT返回200"},
};

function toggleAuth() {
    document.getElementById("auth-value-group").style.display = 
        document.getElementById("p-auth").value === "none" ? "none" : "block";
}
function tab(t) {
    ["plan","exec","ai"].forEach(x => document.getElementById("tab-"+x).classList.toggle("hidden", x!==t));
    document.querySelectorAll(".nav a").forEach(a => a.classList.toggle("on", a.textContent.includes(
        t==="plan"?"新建":t==="exec"?"执行":"AI"
    )));
    if (t==="exec") loadHist();
    if (t==="ai" && !_aiEditingId && _aiActiveId) selectAIProfile(_aiActiveId);
}

// ===== TEMPLATES =====
function initTpls() {
    document.getElementById("tpls").innerHTML = Object.keys(TPLS).map(k =>
        `<button class="tpl" data-k="${k}" onclick="apply('${k}',this)">${TPLS[k].name}</button>`
    ).join("");
}
function apply(k, el) {
    document.querySelectorAll(".tpl").forEach(t => t.classList.remove("on"));
    el.classList.add("on");
    const t = TPLS[k];
    document.getElementById("p-name").value = t.name;
    document.getElementById("p-url").value = t.url;
    document.getElementById("p-rules").value = t.rules;
    document.getElementById("api-list").innerHTML = "";
    t.apis.forEach(a => { addApi(); const rows = document.querySelectorAll("#api-list tr"); const l = rows[rows.length-1]; l.querySelector(".api-m").value = a.m; l.querySelector(".api-p").value = a.p; l.querySelector(".api-n").value = a.n; });
    document.getElementById("pg-list").innerHTML = "";
    t.pgs.forEach(p => { addPg(); const r = document.querySelectorAll("#pg-list tr"); const l = r[r.length-1]; l.querySelector(".pg-u").value = p.u; l.querySelector(".pg-na").value = p.na; if(p.br) l.querySelector(".pg-br").value = p.br; });
    save();
}

// ===== ADD ROWS =====
function addApi() {
    const tr = document.createElement("tr"); tr.className = "api-row";
    tr.innerHTML = `<td><select class="api-m" style="width:80px"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select></td>
        <td><input class="api-p" placeholder="/api/path" oninput="save()" style="width:100%"></td>
        <td><input class="api-n" placeholder="说明" oninput="save()" style="width:100%"></td>
        <td><span class="del" onclick="this.closest('tr').remove();save()" style="cursor:pointer;color:#ef5350">&times;</span></td>`;
    document.getElementById("api-list").appendChild(tr); save();
}
function addPg() {
    const tr = document.createElement("tr"); tr.className = "pg-row";
    tr.innerHTML = `<td><input class="pg-u" placeholder="/" oninput="save()" style="width:100%"></td>

function _streamSSE(pid, plan) {
    const evt = new EventSource('/api/stream?id=' + pid);
    window._activeEvt = evt;
    if (!window._counters) window._counters = {};
    if (!window._counters[pid]) window._counters[pid] = {tt:0, pp:0, ff:0};
    let c = window._counters[pid];
    evt.onmessage = function(e) {
        try { const d = JSON.parse(e.data);
        if (d.t === "test") {
            document.getElementById("r-log").textContent += d.line + "\n";
            if (d.line.includes("[PASS]")) { c.pp++; c.tt++; }
            else if (d.line.includes("[FAIL]")) { c.ff++; c.tt++; }
            document.getElementById("r-total").textContent = c.tt;
            document.getElementById("r-passed").textContent = c.pp;
            document.getElementById("r-failed").textContent = c.ff;
            document.getElementById("r-rate").textContent = c.tt ? Math.round(c.pp/c.tt*100)+"%" : "-";
            if (d.pct) document.getElementById("r-bar").style.width = d.pct + "%";
            document.getElementById("r-log").scrollTop = document.getElementById("r-log").scrollHeight;
        } else if (d.t === "done") {
            evt.close();
            window._activeEvt = null;
            var sb = document.getElementById("stop-btn"); if(sb){ sb._state = "done"; sb.style.display = "none"; }
            setTimeout(async ()=>{
                try{
                    const r = await fetch('/api/report-count');
                    const rd = await r.json();
                    document.getElementById("r-total").textContent = rd.total;
                    document.getElementById("r-passed").textContent = rd.passed;
                    document.getElementById("r-failed").textContent = rd.failed;
                    document.getElementById("r-errors").textContent = rd.errors||0;
                    document.getElementById("r-rate").textContent = rd.rate + "%";
                    document.getElementById("r-bar").style.background = (rd.failed===0 && rd.errors===0) ? "#27ae60" : "#ef5350";
                    document.getElementById("res-title").textContent = plan.name + " — " + ((rd.failed===0 && rd.errors===0) ? "全部通过" : "部分失败");
                }catch(e){}
            }, 500);
            document.getElementById("r-bar").style.width = "100%";
            document.getElementById("res-title").textContent = plan.name + " — " + (d.failed === 0 ? "全部通过" : "部分失败");
        }
        } catch(e) { /* skip malformed SSE messages */ }
    };
    evt.onerror = function() { evt.close(); window._activeEvt = null; var sb = document.getElementById("stop-btn"); if(sb){ sb._state = "done"; sb.style.display = "none"; } document.getElementById("r-bar").style.background = "#ef5350"; document.getElementById("res-title").textContent = plan.name + " — 连接中断"; };
}

            btn.textContent = "重新执行"; btn.style.background = "#5c6bc0";
            btn._state = "stopped";
            document.getElementById("r-bar").style.background = "#ef5350";
            document.getElementById("res-title").textContent = plan.name + " — 已停止";
        } else if (btn._state === "stopped") {
            btn.style.display = "none"; window._counters = {}; generate();
        }
    };
    try {
        const pr = await fetch('/api/plan', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(plan)});
        if (!pr.ok) {
            document.getElementById("r-log").textContent = "服务器错误: HTTP " + pr.status;
            return;
        }
        const pd = await pr.json();
        if (!pd.id) {
            document.getElementById("r-bar").style.background = "#ef5350";
            document.getElementById("r-log").textContent = "错误: " + (pd.error || "Plan submission failed");
            return;
        }
        window._lastPid = pd.id;
        _streamSSE(pd.id, plan);
    } catch(e) {
        document.getElementById("r-log").textContent = "网络错误: " + e.message;
    }
}
async function savePreviewed() {
    const suggestions = window._previewSuggestions||[];
    if (!suggestions.length) { alert('没有可保存的用例，请先生成预览'); return; }
    const plan = {
        name: window._previewName||'未命名',
        url: document.getElementById("p-url").value.trim()||'http://localhost',
        apis: suggestions.map(s => ({m:s.method||'GET', p:s.path||'/', n:s.title||s.path})),
        pages: window._previewPgs||[],
    };
    try {
        const r = await fetch('/api/save-tc', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(plan)});
        const d = await r.json();
        alert('新增 ' + (d.added||0) + ' 条，总计 ' + (d.total||0) + ' 条');
    } catch(e) { alert('保存失败: ' + e.message); }
}
let _tcs = [];
async function saveToTC() {
    save();
    const apis = []; document.querySelectorAll("#api-list tr").forEach(r => { const m = r.querySelector(".api-m").value, p = r.querySelector(".api-p").value.trim(), n = r.querySelector(".api-n").value.trim(); if (p) apis.push({m,p,n}); });
    const pgs = []; document.querySelectorAll("#pg-list tr").forEach(r => { const u = r.querySelector(".pg-u").value.trim(), na = r.querySelector(".pg-na").value.trim(); if (u) pgs.push({u,na}); });

        const d = await r.json();
        alert('已保存 ' + (d.added||0) + ' 个用例到用例库');
        window.open('/tc','_blank');
    } catch(e) { alert('保存失败: ' + e.message); }
}
async function loadTCs() {
    try {
        const r = await fetch('/api/tc');
        _tcs = (await r.json()).cases||[];
        document.getElementById('tc-import-btn').textContent = '从用例库导入 (' + _tcs.length + ')';
    } catch(e) { _tcs = []; alert('加载用例库失败: ' + e.message); return; }
    document.getElementById('tc-modal').style.display = 'block';
    renderTCList();
}
function renderTCList() {
    const q = (document.getElementById('tc-search').value||'').toLowerCase();
    const list = _tcs.filter(tc => !q || (tc.module+tc.title+tc.path).toLowerCase().includes(q));
    const e=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    document.getElementById('tc-list').innerHTML = list.length ? list.map(tc => `
        <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid #e8ecf1;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:13px">
            <input type="checkbox" value="${e(tc.id)}" class="tc-check">
            <span style="font-family:monospace;background:#f0f0f0;padding:2px 6px;border-radius:3px;font-size:11px">${e(tc.method)}</span>
            <span style="font-family:monospace;font-size:11px">${e(tc.path)}</span>
            <strong>${e(tc.title)}</strong>
            <span style="color:#888;font-size:11px;margin-left:auto">${e(tc.module)}</span>
        </label>
    `).join('') : '<div style="text-align:center;padding:20px;color:#888">用例库为空，请先在 /tc 页面创建用例</div>';
}
function importSelectedTCs() {
    const checks = document.querySelectorAll('.tc-check:checked');
    if (!checks.length) { alert('请至少勾选一个用例'); return; }
    checks.forEach(cb => {
        const tc = _tcs.find(t => t.id === cb.value);
        if (!tc) return;
        addApi();
        const rows = document.querySelectorAll('#api-list tr');
        const r = rows[rows.length-1];
        r.querySelector('.api-m').value = tc.method||'GET';
        r.querySelector('.api-p').value = tc.path||'';
        r.querySelector('.api-n').value = tc.title||'';
    });
    document.getElementById('tc-modal').style.display = 'none';
    save();
}

// ===== AI CONFIG (multi-profile) =====
let _aiProfiles = [], _aiActiveId = '', _aiEditingId = '';

function loadAIProfiles() {
    try { _aiProfiles = JSON.parse(localStorage.getItem('ai_profiles')||'[]'); } catch(e) { _aiProfiles = []; }
    _aiActiveId = localStorage.getItem('ai_active')||'';
    if (!_aiProfiles.length) {
        _aiProfiles.push({id:'default',name:'默认配置',provider:'deepseek',model:'deepseek-chat',base_url:'https://api.deepseek.com/v1',temperature:0.7,max_tokens:4096,system_prompt:'你是一个专业的测试工程师，根据 API 定义生成 ISTQB 标准的测试用例。'});
        _aiActiveId = 'default';
        saveAIProfiles();
    }
    renderAIList();
    if (_aiActiveId) selectAIProfile(_aiActiveId);
    else selectAIProfile(_aiProfiles[0].id);
    // Check key status
    fetch('/api/ai-key-status').then(r=>r.json()).then(d=>{
        document.getElementById('ai-status').textContent = d.configured ? (d.valid ? '(已配置)' : '⚠') : '';
        document.getElementById('ai-status').style.color = d.configured ? (d.valid ? '#27ae60' : '#ff9800') : '#888';
        var ks = document.getElementById('ai-key-status');
        if (d.configured && !d.valid) {
            ks.style.display='block'; ks.innerHTML='<span style="color:#ff9800">⚠ ' + (d.hint||'Key 可能不完整') + '</span>';
        }
    }).catch(()=>{});
}
function saveAIProfiles() { localStorage.setItem('ai_profiles',JSON.stringify(_aiProfiles)); localStorage.setItem('ai_active',_aiActiveId); }
function renderAIList() {
    fetch('/api/ai-key-status').then(r=>r.json()).then(d=>{
    const keyOk = d.configured;
    document.getElementById('ai-config-list').innerHTML = _aiProfiles.map(p => {
        const a=p.id===_aiActiveId, e=p.id===_aiEditingId;
        const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const bg = e?'#e8ecf1':a?'#f0fdf4':'#fff';
        const bd = a?'2px solid #27ae60':'1px solid #e8ecf1';
        return `<div onclick="selectAIProfile('${p.id}')" style="padding:10px;margin-bottom:6px;border-radius:8px;cursor:pointer;font-size:12px;background:${bg};border:${bd};transition:.15s">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span style="font-weight:700">${esc(p.name)}</span>
                ${a?'<span style="background:#27ae60;color:#fff;padding:1px 8px;border-radius:10px;font-size:10px">使用中</span>':''}
            </div>
            <div style="color:#5c6bc0;font-size:11px;font-weight:600">${esc(p.provider)} · ${esc(p.model||'未设模型')}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">
                <span style="color:#888;font-size:10px">${keyOk?'🔑 密钥已配置':'⚠ 未配置密钥'}</span>
                <span style="color:#888;font-size:10px">t=${p.temperature}</span>
            </div>
        </div>`;
    }).join(''); }).catch(()=>{});
}
function newAIConfig() {
    const id='cfg_'+Date.now();
    _aiProfiles.push({id,name:'新配置',provider:'openai',model:'gpt-4o',base_url:'',temperature:0.7,max_tokens:4096,system_prompt:'你是一个专业的测试工程师，根据 API 定义生成 ISTQB 标准的测试用例。'});
    saveAIProfiles(); selectAIProfile(id);
}
function selectAIProfile(id) {
    _aiEditingId=id; const p=_aiProfiles.find(x=>x.id===id); if(!p)return;
    document.getElementById('ai-config-name').value=p.name||'';
    document.getElementById('ai-provider').value=p.provider||'openai';
    document.getElementById('ai-model').value=p.model||'';
    document.getElementById('ai-base-url').value=p.base_url||'';
    document.getElementById('ai-temp').value=p.temperature||0.7;
    document.getElementById('ai-max-tokens').value=p.max_tokens||4096;
    document.getElementById('ai-system-prompt').value=p.system_prompt||'';
    document.getElementById('ai-key-input').value='';
    document.getElementById('ai-saved-msg').style.display='none';
    fetch('/api/ai-key-status').then(r=>r.json()).then(d=>{
        const ks=document.getElementById('ai-key-status');
        ks.style.display='block';
        if (d.configured) {
            if (d.valid) ks.innerHTML='<span style="color:#27ae60">✅ 密钥完整</span>';
            else ks.innerHTML='<span style="color:#ff9800">⚠ '+(d.hint||'不完整')+'</span>';
        } else { ks.innerHTML='<span style="color:#888">未配置密钥</span>'; }
    }).catch(()=>{});
    renderAIList();
}
function deleteAIConfig() {
    if(_aiProfiles.length<=1){alert('至少保留一个配置');return;}
    if(!confirm('删除此配置？'))return;
    _aiProfiles=_aiProfiles.filter(x=>x.id!==_aiEditingId);
    if(_aiActiveId===_aiEditingId)_aiActiveId=_aiProfiles[0].id;
    _aiEditingId=_aiProfiles[0].id; saveAIProfiles(); selectAIProfile(_aiEditingId);
}
function showAIKeyModal(){tab('ai');}
function toggleAIKeyVisibility(){
    const inp=document.getElementById('ai-key-input');
    inp.type=inp.type==='password'?'text':'password';
    document.getElementById('ai-eye').textContent=inp.type==='password'?'👁':'🙈';
}
function onAIProviderChange(){
    const p=document.getElementById('ai-provider').value;
    const m={openai:{m:'gpt-4o',u:'https://api.openai.com/v1'},deepseek:{m:'deepseek-chat',u:'https://api.deepseek.com/v1'},qwen:{m:'qwen-max',u:'https://dashscope.aliyuncs.com/compatible-mode/v1'},claude:{m:'claude-3-5-sonnet-20241022',u:'https://api.anthropic.com/v1'},custom:{m:'',u:''}};
    const d=m[p]; if(d){document.getElementById('ai-model').value=d.m;document.getElementById('ai-base-url').value=d.u;}
}
async function saveAIConfig(){
    if(!_aiEditingId)return;
    const p=_aiProfiles.find(x=>x.id===_aiEditingId); if(!p)return;
    const msg=document.getElementById('ai-saved-msg');
    p.name=document.getElementById('ai-config-name').value.trim()||'未命名';
    p.provider=document.getElementById('ai-provider').value;
    p.model=document.getElementById('ai-model').value.trim();
    p.base_url=document.getElementById('ai-base-url').value.trim();
    p.temperature=parseFloat(document.getElementById('ai-temp').value)||0.7;
    p.max_tokens=parseInt(document.getElementById('ai-max-tokens').value)||4096;
    p.system_prompt=document.getElementById('ai-system-prompt').value.trim();
    _aiActiveId=_aiEditingId;
    const key=document.getElementById('ai-key-input').value.trim();
    if(key){
        const r=await fetch('/api/ai-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});
        const d=await r.json();
        if(!d.ok){msg.style.display='block';msg.innerHTML='<span style="color:#ef5350">'+(d.error||'密钥保存失败')+'</span>';return;}
        document.getElementById('ai-key-input').value='';
        document.getElementById('ai-key-status').style.display='block';
        document.getElementById('ai-key-status').innerHTML='<span style="color:#27ae60">密钥已加密保存</span>';
    }
    saveAIProfiles();
    msg.style.display='block';
    msg.innerHTML='<span style="color:#27ae60">已保存，当前使用: '+p.name+' ('+p.provider+')</span>';
    fetch('/api/ai-key-status').then(r=>r.json()).then(d=>{
        document.getElementById('ai-status').textContent = d.configured ? (d.valid ? '(已配置)' : '⚠') : '';
        document.getElementById('ai-status').style.color = d.configured ? (d.valid ? '#27ae60' : '#ff9800') : '#888';
        var ks = document.getElementById('ai-key-status');
        if (d.configured && !d.valid) {
            ks.style.display='block'; ks.innerHTML='<span style="color:#ff9800">⚠ '+(d.hint||'Key 可能不完整')+'</span>';
        }
    }).catch(()=>{});
}
