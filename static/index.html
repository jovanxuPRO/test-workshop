<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试工坊 Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#333}
.nav{background:#5c6bc0;color:#fff;padding:12px 20px;display:flex;gap:20px;align-items:center;font-size:14px}
.nav a{color:#c4c9f7;text-decoration:none;cursor:pointer}.nav a:hover,.nav a.on{color:#fff}
.main{max-width:1000px;margin:20px auto;padding:0 20px}
.card{background:#fff;border-radius:10px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
h2{font-size:17px;margin-bottom:12px;color:#2c3e50}
.row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:200px}
label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
input,textarea,select{width:100%;padding:8px 12px;border:2px solid #e8ecf1;border-radius:7px;font-size:13px;font-family:inherit}
textarea{min-height:100px;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:#5c6bc0;outline:none}
.btn{padding:10px 24px;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:#5c6bc0;color:#fff}.btn-primary:hover{opacity:.9}
.btn-go{background:#26a69a;color:#fff;font-size:16px;padding:14px 40px;width:100%}.btn-go:hover{opacity:.9}
.btn-sm{padding:5px 12px;font-size:11px}
.templates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.tpl{padding:10px 16px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.tpl:hover{border-color:#5c6bc0}.tpl.on{border-color:#26a69a;background:#f0fdf4}
.endpoint{display:flex;gap:6px;align-items:center;padding:8px 10px;background:#f8f9fb;border-radius:7px;margin-bottom:6px}
.endpoint input,.endpoint select{padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;flex:1}
.del{color:#ef5350;cursor:pointer;font-weight:700;font-size:16px;padding:4px}
.metrics{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
.m{background:#f8f9fb;border-radius:8px;padding:14px;text-align:center;min-width:90px;flex:1}
.m .v{font-size:26px;font-weight:700;display:block}.m .l{font-size:11px;color:#888;margin-top:3px}
.bar{height:10px;background:#e8ecf1;border-radius:5px;overflow:hidden;margin:10px 0}
.bar-f{height:100%;border-radius:5px;transition:width .3s}
.log{background:#1a1c23;color:#a2a3b7;padding:12px;border-radius:8px;font-size:12px;font-family:Consolas,monospace;max-height:400px;overflow-y:auto;line-height:1.6}
.pass{color:#55efc4}.fail{color:#ff7675}
.hidden{display:none}
.add-btn{width:100%;padding:6px;border:2px dashed #d0d5e0;border-radius:7px;font-size:12px;color:#8898aa;background:transparent;cursor:pointer;margin-top:6px;text-align:center}
.add-btn:hover{border-color:#5c6bc0;color:#5c6bc0}
</style>
</head>
<body>
<nav class="nav">
    <strong>测试工坊 Pro</strong>
    <a class="on" onclick="tab('plan')">新建方案</a>
    <a onclick="tab('exec')">执行</a>
    <a href="/api/history" target="_blank">执行历史</a>
    <a href="/api/report" target="_blank">测试报告</a>
    <a href="/tc" target="_blank">用例管理</a>
</nav>

<div class="main">
<!-- PLAN -->
<div id="tab-plan">
    <div class="card">
        <h2>1. 选择模板 & 项目信息</h2>
        <div class="templates" id="tpls"></div>
        <div class="row">
            <div><label>项目名称</label><input id="p-name" placeholder="被测项目名称"></div>
            <div><label>Base URL</label><input id="p-url" placeholder="https://example.com"></div>
        </div>
    </div>

    <div class="card">
        <h2>2. API 接口</h2><div id="api-list"></div>
        <div class="add-btn" onclick="addApi()">+ 添加接口</div>
    </div>

    <div class="card">
        <h2>3. Web 页面</h2><div id="pg-list"></div>
        <div class="add-btn" onclick="addPg()">+ 添加页面</div>
    </div>

    <div class="card">
        <h2>4. 数据规则</h2>
        <label>每行一条规则</label>
        <textarea id="p-rules" placeholder="首页HTTP 200\n响应时间<5秒\n数据一致"></textarea>
    </div>

    <button class="btn btn-go" onclick="generate()">生成测试代码 & 执行</button>
    <div id="results" class="hidden" style="margin-top:16px"></div>
</div>

<!-- EXEC -->
<div id="tab-exec" class="hidden">
    <div class="card">
        <h2>选择方案执行</h2>
        <select id="hist-sel" style="width:100%" onchange="onHist()"><option value="">-- 选择 --</option></select>
        <button class="btn btn-primary btn-go" id="btn-hist" onclick="execHist()" disabled style="margin-top:10px">执行</button>
    </div>
    <div class="card hidden" id="dash">
        <h2 id="dash-title">实时面板</h2>
        <div class="metrics" style="cursor:pointer" onclick="window.open('/api/report')">
            <div class="m"><span class="v" style="color:#3498db" id="m-total">0</span><span class="l">总计</span></div>
            <div class="m"><span class="v" style="color:#27ae60" id="m-passed">0</span><span class="l">通过</span></div>
            <div class="m"><span class="v" style="color:#ef5350" id="m-failed">0</span><span class="l">失败</span></div>
            <div class="m"><span class="v" style="color:#ff9800" id="m-errors">0</span><span class="l">错误</span></div>
            <div class="m"><span class="v" style="color:#5c6bc0" id="m-rate">-</span><span class="l">通过率</span></div>
        </div>
        <div class="bar"><div class="bar-f" id="dash-bar" style="width:0%;background:#5c6bc0"></div></div>
        <div class="log" id="dash-log">等待执行...</div>
    </div>
</div>
</div>

<script>
// ===== DATA =====
const TPLS = {
    task: {name:"Task Manager",url:"http://127.0.0.1:8000", apis:[
        {m:"GET",p:"/api/users",n:"用户列表"},{m:"POST",p:"/api/users",n:"创建用户"},{m:"GET",p:"/api/users/{id}",n:"用户详情"},
        {m:"PUT",p:"/api/users/{id}",n:"更新用户"},{m:"DELETE",p:"/api/users/{id}",n:"删除用户"},
        {m:"GET",p:"/api/tasks",n:"任务列表"},{m:"POST",p:"/api/tasks",n:"创建任务"},
        {m:"PUT",p:"/api/tasks/{id}",n:"更新任务"},{m:"DELETE",p:"/api/tasks/{id}",n:"删除任务"},
        {m:"GET",p:"/api/stats",n:"数据统计"}],
        pgs:[{u:"/",na:"首页",ac:"仪表盘"},{u:"/users-page",na:"用户管理",ac:"增删改"},{u:"/tasks-page",na:"任务管理",ac:"增删改+过滤"}],
        rules:"删除用户后关联任务负责人清空\n统计API数据与实际一致\n状态分布之和=总任务数\n重复用户名/邮箱应被拒绝\n完成率=done/total×100"},
    baidu:{name:"Baidu 百度全量",url:"https://www.baidu.com", apis:[
        {m:"GET",p:"/",n:"首页"},
        {m:"HEAD",p:"/",n:"首页HEAD"},
        {m:"GET",p:"/s?wd=hello",n:"英文搜索"},
        {m:"GET",p:"/s?wd=测试",n:"中文搜索"},
        {m:"GET",p:"/s?wd=test&pn=10",n:"搜索第2页"},
        {m:"GET",p:"/s?wd=test&pn=20",n:"搜索第3页"},
        {m:"GET",p:"/s?wd=test&rn=50",n:"每页50条"},
        {m:"GET",p:"/s?wd=",n:"空关键词"},
        {m:"GET",p:"/s?wd=test&rsv_spt=1",n:"搜索建议"},
        {m:"POST",p:"/s",n:"POST搜索"},
        {m:"GET",p:"https://www.baidu.com/img/bd_logo1.png",n:"Logo图片"},
        {m:"GET",p:"https://www.baidu.com/img/PCtm_d9c8750bed0b3c7d089fa7d55720d6cf.png",n:"静态资源"},
        {m:"GET",p:"https://www.baidu.com/search/error.html",n:"错误页面"},
    ],
        pgs:[
            {u:"/",na:"首页",ac:"搜索框可见+无JS报错"},
            {u:"/s?wd=hello",na:"英文搜索",ac:"结果列表加载"},
            {u:"/s?wd=测试",na:"中文搜索",ac:"Unicode关键词正常"},
            {u:"/s?wd=test&pn=10",na:"搜索结果第2页",ac:"翻页导航正常"},
        ],
        rules:"首页HTTP状态码200\n首页ContentType含text/html\n首页含关键词百度\n搜索页HTTP 200\n不同分页返回不同内容\n空搜索不崩溃\nLogo图片可访问\nPOST搜索页可接受\n静态资源ContentType正确\n英文和中文搜索均正常"},
    github:{name:"GitHub API",url:"https://api.github.com", apis:[
        {m:"GET",p:"/",n:"API根"},{m:"GET",p:"/users/torvalds",n:"用户信息"},
        {m:"GET",p:"/repos/torvalds/linux",n:"仓库信息"},{m:"GET",p:"/search/repositories?q=python",n:"搜索"},
        {m:"GET",p:"/rate_limit",n:"限流状态"},{m:"GET",p:"/zen",n:"箴言"}],
        pgs:[], rules:"根路径200\n用户信息含login字段\n仓库信息含stars\n搜索返回items数组"},
    jsonplace:{name:"JSONPlaceholder",url:"https://jsonplaceholder.typicode.com", apis:[
        {m:"GET",p:"/posts",n:"文章列表"},{m:"GET",p:"/posts/1",n:"文章详情"},
        {m:"POST",p:"/posts",n:"创建文章"},{m:"PUT",p:"/posts/1",n:"更新文章"},
        {m:"DELETE",p:"/posts/1",n:"删除文章"},{m:"GET",p:"/comments",n:"评论列表"},
        {m:"GET",p:"/users",n:"用户列表"},{m:"GET",p:"/todos",n:"待办列表"}],
        pgs:[], rules:"posts返回100条\n每条含userId/id/title/body\nPOST返回201\nPUT返回200"},
};

// ===== TAB =====
function tab(t) {
    ["plan","exec"].forEach(x => document.getElementById("tab-"+x).classList.toggle("hidden", x!==t));
    document.querySelectorAll(".nav a").forEach(a => a.classList.toggle("on", a.textContent.includes(t==="plan"?"新建":"执行")));
    if (t==="exec") loadHist();
}

// ===== TEMPLATES =====
function initTpls() {
    document.getElementById("tpls").innerHTML = Object.keys(TPLS).map(k =>
        `<span class="tpl" data-k="${k}" onclick="apply('${k}',this)">${TPLS[k].name}</span>`
    ).join("");
}
function apply(k, el) {
    document.querySelectorAll(".tpl").forEach(t => t.classList.remove("on"));
    el.classList.add("on");
    const t = TPLS[k];
    document.getElementById("p-name").value = t.name;
    document.getElementById("p-url").value = t.url;
    document.getElementById("p-rules").value = t.rules;
    document.getElementById("api-list").innerHTML = "";
    t.apis.forEach(a => { addApi(); const r = document.querySelectorAll(".api-row"); const l = r[r.length-1]; l.querySelector(".api-m").value = a.m; l.querySelector(".api-p").value = a.p; l.querySelector(".api-n").value = a.n; });
    document.getElementById("pg-list").innerHTML = "";
    t.pgs.forEach(p => { addPg(); const r = document.querySelectorAll(".pg-row"); const l = r[r.length-1]; l.querySelector(".pg-u").value = p.u; l.querySelector(".pg-na").value = p.na; });
    save();
}

// ===== ADD ROWS =====
function addApi() {
    const d = document.createElement("div"); d.className = "endpoint api-row";
    d.innerHTML = `<select class="api-m" style="width:80px"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
        <input class="api-p" placeholder="/api/path" oninput="save()">
        <input class="api-n" placeholder="说明" oninput="save()">
        <span class="del" onclick="this.parentElement.remove();save()">x</span>`;
    document.getElementById("api-list").appendChild(d); save();
}
function addPg() {
    const d = document.createElement("div"); d.className = "endpoint pg-row";
    d.innerHTML = `<input class="pg-u" placeholder="/page-path" oninput="save()">
        <input class="pg-na" placeholder="页面名称" oninput="save()">
        <span class="del" onclick="this.parentElement.remove();save()">x</span>`;
    document.getElementById("pg-list").appendChild(d); save();
}

// ===== SAVE/RESTORE =====
function save() {
    const apis = []; document.querySelectorAll(".api-row").forEach(r => { const m = r.querySelector(".api-m").value, p = r.querySelector(".api-p").value.trim(), n = r.querySelector(".api-n").value.trim(); if (p) apis.push({m,p,n}); });
    const pgs = []; document.querySelectorAll(".pg-row").forEach(r => { const u = r.querySelector(".pg-u").value.trim(), na = r.querySelector(".pg-na").value.trim(); if (u) pgs.push({u,na}); });
    const d = {name: document.getElementById("p-name").value, url: document.getElementById("p-url").value, rules: document.getElementById("p-rules").value, apis, pgs};
    localStorage.setItem("wiz", JSON.stringify(d));
}
function restore() {
    try {
        const d = JSON.parse(localStorage.getItem("wiz")); if (!d) return;
        document.getElementById("p-name").value = d.name||""; document.getElementById("p-url").value = d.url||""; document.getElementById("p-rules").value = d.rules||"";
        document.getElementById("api-list").innerHTML = ""; (d.apis||[]).forEach(a => { addApi(); const r = document.querySelectorAll(".api-row"); const l = r[r.length-1]; l.querySelector(".api-m").value = a.m; l.querySelector(".api-p").value = a.p; l.querySelector(".api-n").value = a.n; });
        document.getElementById("pg-list").innerHTML = ""; (d.pgs||[]).forEach(p => { addPg(); const r = document.querySelectorAll(".pg-row"); const l = r[r.length-1]; l.querySelector(".pg-u").value = p.u; l.querySelector(".pg-na").value = p.na; });
    } catch(e) {}
}

// ===== GENERATE =====
async function generate() {
    save();
    const apis = []; document.querySelectorAll(".api-row").forEach(r => { const m = r.querySelector(".api-m").value, p = r.querySelector(".api-p").value.trim(), n = r.querySelector(".api-n").value.trim(); if (p) apis.push({m,p,n}); });
    const pgs = []; document.querySelectorAll(".pg-row").forEach(r => { const u = r.querySelector(".pg-u").value.trim(), na = r.querySelector(".pg-na").value.trim(); if (u) pgs.push({u,na}); });
    const plan = {name: document.getElementById("p-name").value.trim()||"未命名", url: document.getElementById("p-url").value.trim(), apis, pages: pgs, rules: document.getElementById("p-rules").value.split("\n").filter(l=>l.trim()), types: ["api","ui","data"], time: new Date().toLocaleString()};
    let hist = []; try { hist = JSON.parse(localStorage.getItem("plan_hist")||"[]"); } catch(e) {}
    hist.unshift(plan); if (hist.length > 20) hist = hist.slice(0,20); localStorage.setItem("plan_hist", JSON.stringify(hist));

    document.getElementById("results").classList.remove("hidden");
    document.getElementById("results").innerHTML = `<div class="card">
        <h2 id="res-title">${plan.name} — 执行中...</h2>
        <div class="metrics" style="cursor:pointer" onclick="window.open('/api/report')">
            <div class="m"><span class="v" style="color:#3498db" id="r-total">-</span><span class="l">总计</span></div>
            <div class="m"><span class="v" style="color:#27ae60" id="r-passed">-</span><span class="l">通过</span></div>
            <div class="m"><span class="v" style="color:#ef5350" id="r-failed">-</span><span class="l">失败</span></div>
            <div class="m"><span class="v" style="color:#ff9800" id="r-errors">-</span><span class="l">错误</span></div>
            <div class="m"><span class="v" style="color:#5c6bc0" id="r-rate">-</span><span class="l">通过率</span></div>
        </div>
        <div class="bar"><div class="bar-f" id="r-bar" style="width:5%;background:#5c6bc0"></div></div>
        <div class="log" id="r-log">执行中...</div>
    </div>`;
    document.getElementById("results").scrollIntoView({behavior:"smooth"});

    // SSE stream
    const evt = new EventSource("/api/stream?plan=" + encodeURIComponent(JSON.stringify(plan)));
    let tt = 0, pp = 0, ff = 0;
    evt.onmessage = function(e) {
        const d = JSON.parse(e.data);
        if (d.t === "test") {
            document.getElementById("r-log").textContent += d.line + "\n";
            if (d.line.includes("PASSED")) { pp++; tt++; }
            else if (d.line.includes("FAILED")) { ff++; tt++; }
            document.getElementById("r-total").textContent = tt;
            document.getElementById("r-passed").textContent = pp;
            document.getElementById("r-failed").textContent = ff;
            document.getElementById("r-rate").textContent = tt ? Math.round(pp/tt*100)+"%" : "-";
            if (d.pct) document.getElementById("r-bar").style.width = d.pct + "%";
            document.getElementById("r-log").scrollTop = document.getElementById("r-log").scrollHeight;
        } else if (d.t === "done") {
            evt.close();
            // Fetch precise numbers from report
            setTimeout(async ()=>{
                try{
                    const r = await fetch('/api/report-count');
                    const rd = await r.json();
                    document.getElementById("r-total").textContent = rd.total;
                    document.getElementById("r-passed").textContent = rd.passed;
                    document.getElementById("r-failed").textContent = rd.failed;
                    document.getElementById("r-errors").textContent = rd.errors||0;
                    document.getElementById("r-rate").textContent = rd.rate + "%";
                }catch(e){}
            }, 500);
            document.getElementById("r-bar").style.width = "100%";
            document.getElementById("r-bar").style.background = d.failed === 0 ? "#27ae60" : "#ef5350";
            document.getElementById("res-title").textContent = plan.name + " — " + (d.failed === 0 ? "全部通过" : "部分失败");
        }
    };
    evt.onerror = function() { evt.close(); document.getElementById("r-bar").style.background = "#ef5350"; };
}

// ===== EXEC =====
function loadHist() {
    let hist = []; try { hist = JSON.parse(localStorage.getItem("plan_hist")||"[]"); } catch(e) {}
    document.getElementById("hist-sel").innerHTML = '<option value="">-- 选择方案 --</option>' + hist.map((p,i) => `<option value="${i}">${p.name} (${p.url}) - ${p.time||''}</option>`).join("");
    // Also load execution logs
    fetch('/api/history').then(r=>r.json()).then(d=>{
        const logs = d.history||[];
        document.getElementById("exec-log-list").innerHTML = logs.length ? logs.map((l,i)=>`<div class="hist-item" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid #e8ecf1;border-radius:7px;margin-bottom:6px;font-size:12px">
            <div><strong>${l.name}</strong> <span style="color:#888;font-size:11px">${l.time}</span></div>
            <div style="display:flex;gap:8px;align-items:center">
                <span style="color:${l.failed>0?'#ef5350':'#27ae60'};font-weight:700">${l.passed}/${l.total} ${l.rate}%</span>
                <button class="btn btn-sm" style="background:#fce4ec;color:#ef5350" onclick="delExec(${i})">删除</button>
            </div></div>`).join('') : '<div style="text-align:center;color:#888;padding:20px">暂无执行记录</div>';
    });
}
function delExec(i) { if(confirm('Delete?')){fetch('/api/history/'+i,{method:'DELETE'}).then(()=>loadHist());} }
function onHist() { document.getElementById("btn-hist").disabled = document.getElementById("hist-sel").value === ""; }
function execHist() {
    let hist = JSON.parse(localStorage.getItem("plan_hist")||"[]");
    const plan = hist[document.getElementById("hist-sel").value];
    if (!plan) return;
    document.getElementById("dash").classList.remove("hidden");
    document.getElementById("dash-title").textContent = plan.name + " — 执行中...";
    document.getElementById("dash-log").textContent = "";
    ["m-total","m-passed","m-failed"].forEach(id => document.getElementById(id).textContent = "0");
    document.getElementById("m-rate").textContent = "-";
    document.getElementById("dash-bar").style.width = "5%";
    document.getElementById("dash-bar").style.background = "#5c6bc0";

    const evt = new EventSource("/api/stream?plan=" + encodeURIComponent(JSON.stringify(plan)));
    let tt = 0, pp = 0, ff = 0;
    evt.onmessage = function(e) {
        const d = JSON.parse(e.data);
        if (d.t === "test") {
            document.getElementById("dash-log").textContent += d.line + "\n";
            if (d.line.includes("PASSED")) { pp++; tt++; }
            else if (d.line.includes("FAILED")) { ff++; tt++; }
            document.getElementById("m-total").textContent = tt;
            document.getElementById("m-passed").textContent = pp;
            document.getElementById("m-failed").textContent = ff;
            document.getElementById("m-rate").textContent = tt ? Math.round(pp/tt*100)+"%" : "-";
            if (d.pct) document.getElementById("dash-bar").style.width = d.pct + "%";
            document.getElementById("dash-log").scrollTop = document.getElementById("dash-log").scrollHeight;
        } else if (d.t === "done") {
            evt.close();
            document.getElementById("m-total").textContent = d.total;
            document.getElementById("m-passed").textContent = d.passed;
            document.getElementById("m-failed").textContent = d.failed;
            document.getElementById("m-rate").textContent = d.rate + "%";
            document.getElementById("dash-bar").style.width = "100%";
            document.getElementById("dash-bar").style.background = d.failed === 0 ? "#27ae60" : "#ef5350";
            document.getElementById("dash-title").textContent = plan.name + " — " + (d.failed === 0 ? "全部通过" : "部分失败");
        }
    };
    evt.onerror = function() { evt.close(); };
}

// ===== INIT =====
initTpls(); restore();
if (!localStorage.getItem("wiz")) apply("task", document.querySelector('[data-k="task"]'));
if (!document.querySelector(".api-row")) addApi();
if (!document.querySelector(".pg-row")) addPg();
</script>
</body>
</html>
